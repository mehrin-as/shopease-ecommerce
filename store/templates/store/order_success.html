{% extends 'store/base.html' %}

{% block title %}Order Successful - ShopEase{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7 text-center">
        <!-- Main Card Containing Summary -->
        <div class="card p-5 bg-white border shadow-sm rounded-3">
            <!-- Icon and Headings -->
            <div class="d-flex align-items-center justify-content-center mb-3">
                <span class="fs-1 me-2">🎉</span>
                <h1 class="fw-bold m-0" style="color: #0f764a; font-size: 2.2rem;">Order Placed Successfully!</h1>
            </div>

            <!-- Details text -->
            <p class="text-secondary fs-5 mb-4">
                Thank you for shopping with us. Your total was <strong class="text-dark">₹{{ total_price|floatformat:2 }}</strong>.
            </p>

            <!-- Return button -->
            <div class="d-flex justify-content-center">
                <a href="{% url 'product_list' %}" class="btn btn-primary px-4 py-2 fs-5 fw-bold btn-view rounded-2">
                    Return to Shop
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
