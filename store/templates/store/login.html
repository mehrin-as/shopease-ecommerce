{% extends 'store/base.html' %}

{% block title %}Login - ShopEase{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-6 col-lg-5">
        <h1 class="page-header fw-bold mb-4" style="font-size: 2.2rem;">Login</h1>

        <form method="post" class="mb-4">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 mb-3" style="max-width: 400px; font-size: 0.9rem;">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <!-- Username Box -->
            <div class="mb-3 row align-items-center" style="max-width: 400px;">
                <label for="username" class="col-sm-3 col-form-label fw-semibold text-secondary">Username:</label>
                <div class="col-sm-9">
                    <input type="text" name="username" class="form-control border-secondary-subtle bg-light-subtle" id="username" required>
                </div>
            </div>

            <!-- Password Box -->
            <div class="mb-3 row align-items-center" style="max-width: 400px;">
                <label for="password" class="col-sm-3 col-form-label fw-semibold text-secondary">Password:</label>
                <div class="col-sm-9">
                    <input type="password" name="password" class="form-control border-secondary-subtle bg-light-subtle" id="password" required>
                </div>
            </div>

            <!-- Login submit button -->
            <div class="row mt-4" style="max-width: 400px;">
                <div class="col-sm-9 offset-sm-3">
                    <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold btn-view text-white border-0 rounded-2" style="background-color: #0d6efd;">
                        Login
                    </button>
                </div>
            </div>
        </form>

        <p class="text-secondary mt-4" style="font-size: 0.95rem;">
            Don't have an account? <a href="{% url 'register' %}" class="link-primary text-decoration-none fw-semibold">Register here.</a>
        </p>
    </div>
</div>
{% endblock %}
